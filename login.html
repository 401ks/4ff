<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | NaijaAssets Affiliate</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Hanken+Grotesk:wght@600;700;800&family=Geist:wght@500;600&family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <a href="/" class="logo">Naija<span class="logo-accent">Assets</span></a>
      <nav class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
      </nav>
    </div>
  </header>

  <main class="container" style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 144px); padding: var(--spacing-xl) 0;">
    <div class="glass-card" style="width: 100%; max-width: 480px; padding: var(--spacing-xl);">
      <div class="text-center mb-lg">
        <h1 class="text-2xl font-bold mb-sm">Welcome Back</h1>
        <p class="text-muted">Sign in to access your affiliate dashboard</p>
      </div>
      
      <form id="loginForm" class="space-y-lg">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="glass-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="glass-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg);">
          <label class="checkbox-group">
            <input type="checkbox" id="remember">
            <span class="checkbox-label">Remember me</span>
          </label>
          <a href="#" class="text-sm text-accent hover:underline">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loading hidden">
            <span class="material-symbols-outlined animate-spin">progress_activity</span>
          </span>
        </button>
        
        <p id="errorMsg" class="form-error hidden"></p>
      </form>
      
      <p class="text-center text-muted mt-lg">
        Don't have an account? <a href="signup.html" class="text-accent hover:underline">Create one</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { Auth } from './assets/js/auth.js';
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('loginBtn');
      const btnText = btn.querySelector('.btn-text');
      const btnLoading = btn.querySelector('.btn-loading');
      const errorMsg = document.getElementById('errorMsg');
      
      // Show loading state
      btn.disabled = true;
      btnText.classList.add('hidden');
      btnLoading.classList.remove('hidden');
      errorMsg.classList.add('hidden');
      
      try {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        await Auth.login({ email, password });
        
        // Redirect to intended page or dashboard
        const redirect = localStorage.getItem('redirect_after_login') || '/dashboard.html';
        localStorage.removeItem('redirect_after_login');
        window.location.href = redirect;
        
      } catch (error) {
        errorMsg.textContent = error.message || 'Login failed. Please check your credentials.';
        errorMsg.classList.remove('hidden');
      } finally {
        // Restore button state
        btn.disabled = false;
        btnText.classList.remove('hidden');
        btnLoading.classList.add('hidden');
      }
    });
    
    // Check if already logged in
    import { getSupabase } from './assets/js/supabase-client.js';
    (async () => {
      const supabase = await getSupabase();
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        window.location.href = '/dashboard.html';
      }
    })();
  </script>
</body>
</html>
